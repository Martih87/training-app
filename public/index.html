<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training App</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
    }

    .landing h1 {
      font-size: 2.4rem;
      margin-bottom: 0.5rem;
    }

    .landing .subtitle {
      color: #888;
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }

    .signin-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .signin-box p {
      color: #888;
      font-size: 0.9rem;
    }

    .loading-msg {
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container landing">
    <h1>🏋️ Training App</h1>
    <p class="subtitle">Sign in to track your workouts</p>

    <div class="signin-box">
      <p>Continue with your Google account</p>
      <div id="google-btn" class="loading-msg">Loading...</div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // Check if already signed in — redirect to log page
    fetch("/api/auth/me")
      .then(function(res) {
        if (res.ok) return res.json();
        return null;
      })
      .then(function(profile) {
        if (profile) {
          window.location.replace("/log.html");
        }
      })
      .catch(function() { /* not signed in, stay here */ });

    // Load Google Client ID from server
    fetch("/api/auth/config")
      .then(function(res) { return res.json(); })
      .then(function(config) {
        if (!config.clientId) {
          document.getElementById("google-btn").innerHTML =
            '<p style="color:#e74c3c">Google Client ID not configured.<br>Set GOOGLE_CLIENT_ID env variable.</p>';
          return;
        }

        // Wait for GSI library to load
        function initGoogle() {
          if (typeof google === "undefined" || !google.accounts) {
            setTimeout(initGoogle, 100);
            return;
          }

          google.accounts.id.initialize({
            client_id: config.clientId,
            callback: handleCredentialResponse,
          });

          document.getElementById("google-btn").innerHTML = "";

          google.accounts.id.renderButton(
            document.getElementById("google-btn"),
            {
              theme: "filled_black",
              size: "large",
              shape: "pill",
              text: "signin_with",
              width: 280,
            }
          );
        }

        initGoogle();
      });

    function handleCredentialResponse(response) {
      fetch("/api/auth/google", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ credential: response.credential }),
      })
        .then(function(res) {
          if (res.ok) {
            window.location.href = "/log.html";
          } else {
            return res.json().then(function(data) {
              alert("Sign-in failed: " + (data.error || "Unknown error"));
            });
          }
        })
        .catch(function(err) {
          alert("Sign-in failed: " + err.message);
        });
    }
  </script>
</body>
</html>
