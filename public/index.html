<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training App</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
    }

    .landing h1 {
      font-size: 2.4rem;
      margin-bottom: 0.5rem;
    }

    .landing .subtitle {
      color: #888;
      font-size: 1rem;
      margin-bottom: 2.5rem;
    }

    .profile-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
      width: 100%;
      max-width: 500px;
    }

    .profile-card {
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      border-radius: 16px;
      padding: 1.5rem 2rem;
      min-width: 180px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
    }

    .profile-card:hover {
      border-color: #5b8def;
      background: #1e2333;
      transform: translateY(-2px);
    }

    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5b8def, #39d353);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
    }

    .profile-name {
      font-size: 1.15rem;
      font-weight: 600;
      color: #e8e8e8;
    }

    .profile-sessions {
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container landing">
    <h1>🏋️ Training App</h1>
    <p class="subtitle">Select your profile to get started</p>

    <div class="profile-grid" id="profile-grid">
      <!-- Filled by JS -->
    </div>
  </div>

  <script>
    async function loadProfiles() {
      const grid = document.getElementById("profile-grid");

      const res = await fetch("/api/profiles");
      const profiles = await res.json();

      if (profiles.length === 0) {
        grid.innerHTML = '<p style="color:#666">No profiles found.</p>';
        return;
      }

      grid.innerHTML = profiles.map(function(p) {
        const initial = p.name.charAt(0).toUpperCase();
        return '<a class="profile-card" href="/log.html?profile=' + p.id + '">' +
          '<div class="profile-avatar">' + initial + '</div>' +
          '<div class="profile-name">' + p.name + '</div>' +
        '</a>';
      }).join("");
    }

    loadProfiles();
  </script>
</body>
</html>
