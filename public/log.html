<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>LightWeight!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>🔥 LightWeight!</h1>
        <span class="back-link" id="user-info"></span>
      </div>
      <div class="header-actions">
        <a href="/admin.html" class="btn btn-secondary btn-sm">📊 History</a>
        <button class="btn btn-secondary btn-sm" onclick="signOut()">Sign out</button>
      </div>
    </header>

    <!-- DATE PICKER -->
    <section class="card date-card">
      <label for="session-date">Session Date</label>
      <input type="date" id="session-date" />
    </section>

    <!-- CORE EXERCISES -->
    <h3 class="section-label">Core Exercises</h3>
    <div id="exercise-list"></div>

    <!-- OPTIONAL EXERCISES -->
    <h3 class="section-label">Optional Exercises</h3>
    <div id="optional-exercise-list"></div>

    <!-- USER EXERCISES (linked to account) -->
    <h3 class="section-label">Your Exercises</h3>
    <div id="user-exercise-list"></div>

    <!-- ADD CUSTOM EXERCISE -->
    <section class="card add-exercise-card">
      <h3 class="section-label" style="margin-top:0">Add Exercise</h3>
      <div class="add-exercise-form">
        <input type="text" id="add-exercise-name" placeholder="Exercise name" class="input-text" />
        <div class="add-exercise-defaults">
          <label>Weight <input type="number" id="add-exercise-weight" value="0" min="0" step="2.5" inputmode="decimal" /></label>
          <label>Reps <input type="number" id="add-exercise-reps" value="10" min="1" inputmode="numeric" /></label>
          <label>Sets <input type="number" id="add-exercise-sets" value="3" min="1" max="10" inputmode="numeric" /></label>
        </div>
        <button id="btn-add-exercise" class="btn btn-secondary">+ Add Exercise</button>
      </div>
    </section>

    <!-- SUGGESTIONS -->
    <section class="card" id="suggestions-section">
      <h3 class="section-label" style="margin-top:0">Popular with others</h3>
      <div id="suggestions-list" class="suggestions-list"></div>
    </section>

    <!-- SAVE (sticky bottom) -->
    <div class="sticky-save">
      <button id="btn-save" class="btn btn-primary btn-save-full">Save Session</button>
    </div>

    <!-- SESSION HISTORY -->
    <section id="history" class="card" style="margin-bottom:5rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
        <h2>Recent Sessions</h2>
        <div>
          <a href="/api/export?format=csv" class="btn btn-secondary btn-sm" download>CSV</a>
          <a href="/api/export?format=json" class="btn btn-secondary btn-sm" download>JSON</a>
        </div>
      </div>
      <div id="history-list"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
