<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>🏋️ Training Log</h1>
        <span class="back-link" id="user-info"></span>
      </div>
      <div>
        <a href="/admin.html" class="btn btn-secondary btn-sm">📊 History</a>
        <button class="btn btn-secondary btn-sm" onclick="signOut()">Sign out</button>
      </div>
    </header>

    <!-- NEW SESSION FORM -->
    <section id="new-session" class="card">
      <h2>Log a Session</h2>
      <div class="form-row">
        <label for="session-date">Date</label>
        <input type="date" id="session-date" />
      </div>

      <h3 class="section-label">Core Exercises</h3>
      <div id="exercise-list"></div>

      <h3 class="section-label">Optional Exercises</h3>
      <div id="optional-exercise-list"></div>

      <button id="btn-save" class="btn btn-primary">Save Session</button>
    </section>

    <!-- SESSION HISTORY -->
    <section id="history" class="card">
      <h2>Session History</h2>
      <div id="history-list"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
